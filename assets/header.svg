<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Firas Kanaan GitHub profile banner</title>
  <desc id="desc">Professional profile banner for Firas Kanaan, Senior Full Stack Developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.5" stop-color="#102A43"/>
      <stop offset="1" stop-color="#0E3B43"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="70" x2="1060" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="0" fill="url(#bg)"/>
  <path d="M0 280C158 228 271 246 403 274C563 308 683 326 840 265C965 216 1078 197 1200 238V360H0V280Z" fill="#06141F" opacity="0.65"/>
  <path d="M106 90H1094" stroke="url(#accent)" stroke-width="2" opacity="0.45"/>
  <path d="M106 270H1094" stroke="url(#accent)" stroke-width="2" opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="78" y="58" width="1044" height="244" rx="18" fill="#0F172A" opacity="0.82"/>
    <rect x="78.5" y="58.5" width="1043" height="243" rx="17.5" stroke="#38BDF8" stroke-opacity="0.28"/>
  </g>

  <text x="120" y="145" fill="#E5F3FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="0">
    Firas Kanaan
  </text>
  <text x="122" y="194" fill="#A7F3D0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" letter-spacing="0">
    Senior Full Stack Developer
  </text>
  <text x="122" y="237" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="0">
    Laravel | Node.js | Vue.js | SaaS | Real-time Systems | APIs | Docker
  </text>

  <g transform="translate(890 102)">
    <rect x="0" y="0" width="170" height="118" rx="14" fill="#07111F" stroke="#38BDF8" stroke-opacity="0.35"/>
    <circle cx="28" cy="30" r="7" fill="#EF4444"/>
    <circle cx="52" cy="30" r="7" fill="#F59E0B"/>
    <circle cx="76" cy="30" r="7" fill="#22C55E"/>
    <path d="M38 66L64 88L38 110" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M88 112H130" stroke="#A7F3D0" stroke-width="7" stroke-linecap="round"/>
  </g>
